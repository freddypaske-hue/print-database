<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddy Paske — Print Database</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1614; --parchment: #f5f0e8; --cream: #faf7f2;
    --accent: #8b4513; --accent-light: #c4763a; --accent-pale: #f0e4d4;
    --muted: #7a6e64; --border: #d4c9b8; --danger: #8b2020; --danger-bg: #f5e8e8;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--parchment); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .lock-card { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 24px rgba(26,22,20,0.10); }
  .lock-icon { font-size: 40px; margin-bottom: 16px; }
  .lock-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
  .pw-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 4px; font-size: 15px; font-family: 'DM Mono', monospace; background: white; color: var(--ink); letter-spacing: 0.1em; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--danger); background: var(--danger-bg); }
  .unlock-btn { width: 100%; padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 4px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s; margin-bottom: 10px; }
  .unlock-btn:hover { background: var(--accent-light); }
  .unlock-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
  .logo-line { font-family: 'Playfair Display', serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 28px; }
</style>
</head>

  <div class="error-msg" id="errMsg">❌ Incorrect password — please try again</div>
  <div class="logo-line">Fugee Art Limited</div>
</div>

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

    document.open(); document.write(html); document.close();
  } else {
    document.getElementById('pwInput').classList.add('error');
    document.getElementById('errMsg').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Unlock';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
  document.getElementById('pwInput').classList.remove('error');
  document.getElementById('errMsg').style.display = 'none';
});
</script>
</body>
