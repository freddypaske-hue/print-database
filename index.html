<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddy Paske — Print Database</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1614;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --accent: #8b4513;
    --accent-light: #c4763a;
    --accent-pale: #f0e4d4;
    --muted: #7a6e64;
    --border: #d4c9b8;
    --danger: #8b2020;
    --danger-bg: #f5e8e8;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--parchment);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(26,22,20,0.10);
  }
  .lock-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .lock-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .lock-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .pw-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    background: white;
    color: var(--ink);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--danger); background: var(--danger-bg); }
  .unlock-btn {
    width: 100%;
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
    margin-bottom: 10px;
  }
  .unlock-btn:hover { background: var(--accent-light); }
  .unlock-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    font-size: 12px;
    color: var(--danger);
    margin-top: 6px;
    display: none;
  }
  .logo-line {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="lock-card" id="lockCard">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Print Database</div>
  <div class="lock-sub">Freddy Paske — Fugee Art Company<br>Enter password to continue</div>
  <input class="pw-input" type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <button class="unlock-btn" id="unlockBtn" onclick="unlock()">Unlock</button>
  <div class="error-msg" id="errMsg">❌ Incorrect password — please try again</div>
  <div class="logo-line">Fugee Art Company</div>
</div>

// SHA-256 hash of the correct password (hex) — set this to your chosen password hash
// Default password hash shown here will be replaced when you set your password
const CORRECT_HASH = "c4b6642954bb09e32fae92789e9bb9560ff6460644740d95b674cc1e4a386dfc";

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pw = document.getElementById('pwInput').value;
  if (!pw) return;
  const btn = document.getElementById('unlockBtn');
  btn.disabled = true;
  btn.textContent = 'Checking…';
  
  const hash = await sha256hex(pw);
  
  if (hash === CORRECT_HASH) {
    // Correct — decode and render the app
    // Decode base64 → UTF-8 bytes → string (preserves £ and other non-ASCII chars)
    const bytes = Uint8Array.from(atob(APP_B64), c => c.charCodeAt(0));
    const html = new TextDecoder('utf-8').decode(bytes);
    document.open();
    document.write(html);
    document.close();
  } else {
    document.getElementById('pwInput').classList.add('error');
    document.getElementById('errMsg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Unlock';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
  document.getElementById('pwInput').classList.remove('error');
  document.getElementById('errMsg').style.display = 'none';
});
